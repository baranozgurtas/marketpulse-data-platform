# ============================================================
# TEMPLATE - contains PLACEHOLDER values only.
# Copy to k8s/02-secret.yaml (gitignored), replace every
# CHANGE_ME, then apply. NEVER commit the filled-in copy.
#
#   cp k8s/02-secret.template.yaml k8s/02-secret.yaml
#   $EDITOR k8s/02-secret.yaml
#
# stringData is used instead of data so values are written as
# plain strings (Kubernetes base64-encodes them on admission).
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: marketpulse-secrets
  namespace: marketpulse
type: Opaque
stringData:
  # --- Airflow metadata database (local Postgres below) ---
  POSTGRES_USER: "airflow"
  POSTGRES_PASSWORD: "CHANGE_ME_POSTGRES_PASSWORD"
  POSTGRES_DB: "airflow"
  # Must embed the same Postgres password as above.
  AIRFLOW__CORE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://airflow:CHANGE_ME_POSTGRES_PASSWORD@postgres/airflow"

  # --- Snowflake credentials (read by dbt via profiles.yml) ---
  SNOWFLAKE_ACCOUNT: "CHANGE_ME_ACCOUNT.REGION.CLOUD"
  SNOWFLAKE_USER: "CHANGE_ME_USER"
  SNOWFLAKE_PASSWORD: "CHANGE_ME_PASSWORD"

  # --- Airflow connection for the Snowflake operators ---
  # Format: snowflake://USER:PASSWORD@ACCOUNT/DATABASE?warehouse=WAREHOUSE
  AIRFLOW_CONN_SNOWFLAKE_DEFAULT: "snowflake://CHANGE_ME_USER:CHANGE_ME_PASSWORD@CHANGE_ME_ACCOUNT.REGION.CLOUD/MARKETPULSE?warehouse=COMPUTE_WH"
