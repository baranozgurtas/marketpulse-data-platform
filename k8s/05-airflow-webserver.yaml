apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
  namespace: marketpulse
  labels:
    app: airflow-webserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-webserver
  template:
    metadata:
      labels:
        app: airflow-webserver
    spec:
      containers:
        - name: webserver
          image: marketpulse/airflow:latest
          imagePullPolicy: Never  # local image imported into the cluster
          command: ["airflow", "webserver"]
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: marketpulse-config
            - secretRef:
                name: marketpulse-secrets
          # Airflow exposes /health on the webserver; generous initial
          # delay because gunicorn workers take a while on first boot.
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              memory: 2Gi
---
# NodePort so the UI is reachable from the host without an Ingress
# controller - the simplest option for a local k3s/k3d cluster.
# UI: http://localhost:30080 (k3d maps this via --port, see Makefile)
apiVersion: v1
kind: Service
metadata:
  name: airflow-webserver
  namespace: marketpulse
spec:
  type: NodePort
  selector:
    app: airflow-webserver
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
